<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <title>Netlify Forms</title>
  </head>
  <body>
    <form name="rantang-order" data-netlify="true" netlify-honeypot="bot-field" hidden>
      <input type="text" name="bot-field" />
      <input type="text" name="full_name" />
      <input type="text" name="phone" />
      <input type="text" name="delivery_address" />
      <input type="text" name="dietary_restrictions" />
      <textarea name="order_details"></textarea>
      <input type="text" name="payment_method" />
      <input type="text" name="payment_handle" />
      <input type="text" name="return_packaging" />
      <textarea name="notes"></textarea>
    </form>

    <form name="share-your-story" data-netlify="true" netlify-honeypot="bot-field" hidden>
      <input type="text" name="bot-field" />
      <input type="text" name="name" />
      <input type="text" name="origin" />
      <input type="text" name="connection" />
      <textarea name="story"></textarea>
      <input type="text" name="favorite_dish" />
      <input type="text" name="sharing_preference" />
    </form>
  </body>
</html>
